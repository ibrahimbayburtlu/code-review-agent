name: AI Discuss

# PR'da veya review yorumunda "/ai <soru>" yazılınca tetiklenir ve
# agent bağlam içinde cevap verir.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  discuss:
    # Sadece PR yorumlarında ve "/ai" ile başlayanlarda çalış
    if: |
      startsWith(github.event.comment.body, '/ai') &&
      (github.event.issue.pull_request != null || github.event.pull_request_review_comment != null || github.event_name == 'pull_request_review_comment')
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR metadata
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          # issue_comment olayında PR numarası issue.number, review comment'te pull_request.number
          PR_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
        run: |
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          gh pr view "$PR_NUMBER" --repo "$REPO" \
            --json headRefOid,baseRefOid \
            --jq '"head=\(.headRefOid)\nbase=\(.baseRefOid)"' >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr.outputs.head }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Answer question
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          BASE_SHA: ${{ steps.pr.outputs.base }}
          HEAD_SHA: ${{ steps.pr.outputs.head }}
          QUESTION: ${{ github.event.comment.body }}
        # Repo kökünden çalışır; agent dizinini import yolu olarak ekler
        run: PYTHONPATH=agent python agent/discuss_agent.py
