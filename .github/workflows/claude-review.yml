name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    uses: ./.github/workflows/reusable-review.yml
    with:
      categories: "security,bug,performance,architecture,test"
      persona: "default"
      fail_on: ""
      max_risk_score: ""
      min_confidence: "0"
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
